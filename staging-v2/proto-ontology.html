<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MatterMind — Ontology core (Canvas 2D prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #06060E; }
  html, body { margin: 0; background: var(--bg); color: #fff; font-family: system-ui, sans-serif; }

  /* Tall scroll area so we can preview the scroll-triggered reveal.
     Stage is sticky/pinned for one viewport; spacer gives scroll room.
     In production this becomes a normal section. */
  .scroll-space { height: 360vh; position: relative; }
  .stage {
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
    background: var(--bg);
  }

  /* Stacked layers, all centred on the same horizontal band.
     Stacking order back→front: tray → refinery → node canvas.
     All three PNGs have alpha, so no blend mode is needed — the tray
     shows through the transparent areas above it.
     Reveal order on scroll: refinery → node field → tray. */
  .layer {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    will-change: opacity;
  }
  #trayLayer {
    width: min(620px, 40vw);       /* scaled down to match the design */
    z-index: 2;                    /* behind the ontology, above the ground gradient */
    top: 60%;                      /* overridden by JS to the ground line */
    transform: translateX(-50%);   /* top-anchored at the ground line, feeding down */
    opacity: 1;
    clip-path: inset(0 0 100% 0);  /* hidden until scroll reveals top→bottom */
  }
  #refineryLayer {
    width: min(1040px, 66vw);
    z-index: 3;
    opacity: 0;
  }
  #ontologyCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 5;                    /* top — logo + nodes sit above the ground line/labels */
    opacity: 0;
    will-change: opacity;
  }
  .layer img { display: block; width: 100%; height: auto; }
  /* overlay canvas for glowing particles travelling down the tray streamlines */
  #trayFlow { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

  /* Ground-line devices — the 1px horizon line, the maroon gradient wash
     beneath it, and the OBSERVATION / ACTION labels. All positioned in JS
     to the refinery base (the "ground point"). */
  .ground-gradient {
    position: absolute;
    left: 0; width: 100%;
    height: clamp(45px, 6.5vh, 80px);
    background: linear-gradient(to bottom, #2C191D 0%, rgba(44,25,29,0) 100%);
    opacity: 0;
    z-index: 1;                    /* very back — a subtle horizon wash */
    pointer-events: none;
    will-change: opacity;
  }
  .ground-line {
    position: absolute;
    left: 0; width: 100%;
    height: 1px;
    background: #615256;
    transform: scaleX(0);
    transform-origin: left center; /* extends left → right */
    z-index: 4;
    pointer-events: none;
    will-change: transform;
  }
  .ground-label {
    position: absolute;
    left: clamp(24px, 4vw, 64px);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    opacity: 0;
    z-index: 4;
    pointer-events: none;
    white-space: nowrap;
    will-change: opacity, transform, clip-path;
  }

  .hint {
    position: fixed; left: 16px; bottom: 14px;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.5); pointer-events: none; font-family: monospace;
  }
  .pre, .post { height: 60vh; display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.25); font-size: 12px; letter-spacing: 0.2em;
    text-transform: uppercase; font-family: monospace; }
</style>
</head>
<body>
  <div class="pre">scroll down ↓</div>

  <div class="scroll-space">
    <div class="stage">
      <div id="trayLayer" class="layer"><img src="images/tray.png" alt="" /><canvas id="trayFlow" aria-hidden="true"></canvas></div>
      <div id="refineryLayer" class="layer"><img src="images/refinery.png" alt="" /></div>
      <canvas id="ontologyCanvas" aria-hidden="true"></canvas>
      <div id="groundGrad" class="ground-gradient"></div>
      <div id="groundLine" class="ground-line"></div>
      <div id="obsLabel" class="ground-label">OBSERVATION</div>
      <div id="actLabel" class="ground-label">ACTION</div>
    </div>
  </div>

  <div class="post">section below</div>
  <div class="hint">Prototype · ontology core (flat 2D)</div>

<script>
/* ============================================================
   Deterministic hash (stable node layout across reloads)
   ============================================================ */
function frac(x){ return x - Math.floor(x); }
function hsh(n){ return frac(Math.sin(n * 127.1) * 43758.5453); }
function smoothstep(a, b, x){ const t = Math.max(0, Math.min(1, (x - a) / (b - a))); return t * t * (3 - 2 * t); }
function easeOut(x){ return 1 - Math.pow(1 - x, 3); }

/* ============================================================
   Node + edge model — flat 2D, generated once in a unitless
   horizontal band, mapped to canvas pixels each frame.
   Model space: x ∈ [-1, 1], y ∈ band. Each node carries a `birth`
   threshold (distance from centre) so the network grows outward
   from the middle as the scroll-driven growth factor increases.
   ============================================================ */
const N_SPINE    = 12;
const N_FILL     = 130;
const N_CLUSTERS = 12;       // sub-clusters (centre + satellites), weighted toward the middle
const nodes = [];            // {mx, my, size, birth}
const edges = [];            // {a, b}

function buildModel() {
  // spine — primary nodes across the horizontal axis
  for (let i = 0; i < N_SPINE; i++) {
    const mx = (-1 + (i / (N_SPINE - 1)) * 2) * 0.9 + (hsh(i + 3) - 0.5) * 0.12;
    const my = (hsh(i + 9) - 0.5) * 0.20;
    nodes.push({ mx, my, size: 2.2 + hsh(i) * 0.8 });
  }
  // ambient filler — taller vertical spread than before
  for (let k = 0; k < N_FILL; k++) {
    // centrally-weighted x: dense in the middle, sparse dispersed tails at
    // both ends (so neither edge stops at a hard line)
    const u = hsh(k * 1.7 + 1) * 2 - 1;                       // -1..1
    const mx = Math.sign(u) * Math.pow(Math.abs(u), 1.3) * 0.98;
    let my = (hsh(k * 2.3 + 11) - 0.5) * 1.0;
    my *= 0.55 + 0.45 * Math.abs(my);
    const edgeFade = 1 - 0.35 * Math.min(1, Math.abs(mx));    // nodes shrink toward the edges → dissolve
    nodes.push({ mx, my, size: (1.0 + hsh(k + 5) * 1.0) * edgeFade });
  }
  // sub-clusters — a centre node with satellites, spokes and a ring, echoing
  // the original's cluster structure and adding vertical connectors
  const explicit = [];
  for (let c = 0; c < N_CLUSTERS; c++) {
    // centrally-weighted x → more clusters concentrated around the middle
    const cu = (c / (N_CLUSTERS - 1)) * 2 - 1;             // -1..1
    const cmx = Math.sign(cu) * Math.pow(Math.abs(cu), 1.5) * 0.72 + (hsh(c * 3.7) - 0.5) * 0.12;
    const cmy = (hsh(c * 5.1 + 2) - 0.5) * 0.62;
    const ci = nodes.length;
    nodes.push({ mx: cmx, my: cmy, size: 2.4 + hsh(c) * 0.9, cl: true });
    const nSat = 8 + Math.floor(hsh(c * 2.3) * 5);          // 8–12 satellites
    const sat = [];
    for (let s = 0; s < nSat; s++) {
      const ang = (s / nSat) * Math.PI * 2 + hsh(c * 7 + s) * 0.8;
      const rad = 0.12 + hsh(c * 11 + s) * 0.12;            // longer spokes so the burst reads
      const smx = cmx + Math.cos(ang) * rad;
      const smy = cmy + Math.sin(ang) * rad * 1.3;          // emphasise vertical spread
      const si = nodes.length;
      nodes.push({ mx: smx, my: smy, size: 0.9 + hsh(si) * 0.8, cl: true });
      sat.push(si);
      explicit.push([ci, si]);                              // spoke
    }
    for (let s = 0; s < sat.length; s++) explicit.push([sat[s], sat[(s + 1) % sat.length]]);
  }

  const N = nodes.length;
  // birth threshold ∈ [0,1] — nearer the centre = born earlier (grows outward)
  for (let i = 0; i < N; i++) {
    const dist = Math.min(1, Math.hypot(nodes[i].mx, nodes[i].my * 0.45));
    let b = dist * 0.88 + (hsh(i * 1.9 + 4) - 0.5) * 0.12;
    if (nodes[i].cl) b = Math.min(b, 0.5);    // clusters reliably appear by mid-growth
    nodes[i].birth = Math.max(0, Math.min(0.92, b));
  }
  // nearest-3 neighbour edges (lighter y-weight → more vertical connectors)
  const seen = new Set();
  function link(i, j, spoke) { const key = Math.min(i, j) + '_' + Math.max(i, j);
    if (!seen.has(key)) { seen.add(key); edges.push({ a: i, b: j, spoke: !!spoke }); } }
  for (let i = 0; i < N; i++) {
    const a = nodes[i]; const d = [];
    for (let j = 0; j < N; j++) {
      if (j === i) continue;
      const dx = nodes[j].mx - a.mx, dy = (nodes[j].my - a.my) * 1.35;
      d.push([dx * dx + dy * dy, j]);
    }
    d.sort((p, q) => p[0] - q[0]);
    for (let n = 0; n < 3; n++) link(i, d[n][1]);
  }
  for (const [a, b] of explicit) link(a, b, true);   // cluster spokes/rings — rendered brighter
}
buildModel();

/* ---- pulses: bright dots travelling along edges ("queries firing") ---- */
const NPULSE = 90;
const pulses = [];
for (let i = 0; i < NPULSE; i++) {
  pulses.push({ e: Math.floor(Math.random() * edges.length), t: Math.random(),
    dir: Math.random() < 0.5 ? 1 : -1, spd: 0.35 + Math.random() * 0.7 });
}

/* ============================================================
   Canvas + logo setup
   ============================================================ */
const canvas = document.getElementById('ontologyCanvas');
const ctx = canvas.getContext('2d');
const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const logo = new Image();
let logoReady = false;
logo.onload = () => { logoReady = true; };
logo.src = 'images/mm_indent.png';

/* DOM refs (declared once, up front — updateGround uses them) */
const stage = document.querySelector('.stage');
const refineryLayer = document.getElementById('refineryLayer');
const trayLayer = document.getElementById('trayLayer');
const groundLine = document.getElementById('groundLine');
const groundGrad = document.getElementById('groundGrad');
const obsLabel = document.getElementById('obsLabel');
const actLabel = document.getElementById('actLabel');
const refineryImg = refineryLayer.querySelector('img');

let W = 0, H = 0, cx = 0, cy = 0, sx = 1, sy = 1;
const FRAME_MS = 1000 / 30;
const DPR_CAP = 1.5;

/* ============================================================
   Tray stream-line particles — glowing pulses of light that
   travel DOWN the curved streamlines of the tray. Paths are
   cubic-beziers matching the tray ribs; each particle has
   randomised spawn/speed/size/opacity/delay so the motion stays
   organic and unsynchronised. Additive ('lighter') for glow.
   ============================================================ */
const trayFlow = document.getElementById('trayFlow');
const tctx = trayFlow.getContext('2d');
let TW = 0, THh = 0;

// cached soft radial-glow sprite (fast — drawn per particle instead of shadowBlur)
const glowSprite = document.createElement('canvas'); glowSprite.width = glowSprite.height = 64;
(function () {
  const g = glowSprite.getContext('2d');
  const rg = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  rg.addColorStop(0, 'rgba(255,255,255,1)');
  rg.addColorStop(0.25, 'rgba(255,255,255,0.85)');
  rg.addColorStop(0.5, 'rgba(255,255,255,0.28)');
  rg.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = rg; g.fillRect(0, 0, 64, 64);
})();

// streamline paths — accurate polylines derived from the tray's own SVG (pathref.svg),
// arc-length resampled. Normalised: y 0..1 = rib top..bottom; x centred ~0.5, aspect-preserved.
const trayPaths = (window.RIB_PATHS && window.RIB_PATHS.length) ? window.RIB_PATHS : [[[0.5,0],[0.5,1]]];

// Registration of the rib artwork onto the tray box. Rib HEIGHT maps to the tray box
// height; the x-scale uses the same factor so curve shapes stay undistorted.
// Live-adjustable registration. To align with the PNG, open the page with #tune in the
// URL (e.g. proto-ontology.html#tune) for an on-screen tuner, or set values in DevTools
// via window.RIB (e.g. RIB.xpx = 8). xpx/ypx = pixel nudges, xscale/yscale = stretch.
const RIB = window.RIB = { xscale: 1.0, yscale: 1.0, xpx: 8, ypx: 0, debug: false };
function ribPoint(path, t) {                       // sample the polyline at t∈[0,1]
  const f = t * (path.length - 1);
  const i0 = Math.min(path.length - 2, Math.max(0, Math.floor(f)));
  const fr = f - i0;
  const nx = path[i0][0] + (path[i0 + 1][0] - path[i0][0]) * fr;
  const ny = path[i0][1] + (path[i0 + 1][1] - path[i0][1]) * fr;
  return [
    TW * 0.5 + (nx - 0.5) * THh * RIB.xscale + RIB.xpx,
    ny * THh * RIB.yscale + RIB.ypx
  ];
}

// per-rib weight — spawn fewer particles on the far-left/right (outer) ribs
const ribMaxDev = trayPaths.map(p => { let md = 0; for (const q of p) { const d = Math.abs(q[0] - 0.5); if (d > md) md = d; } return md; });
const pathW = ribMaxDev.map(md => Math.max(0.10, 1 - Math.pow(Math.min(1, md / 0.95), 1.3)));
const pathWsum = pathW.reduce((a, b) => a + b, 0);
function pickPath() { let r = Math.random() * pathWsum; for (let i = 0; i < pathW.length; i++) { r -= pathW[i]; if (r <= 0) return i; } return pathW.length - 1; }

const N_TRAY = 46;
const trayParts = [];
function spawnTray(p, initial) {
  p.path = pickPath();
  p.t    = initial ? Math.random() : 0;
  p.spd  = 0.10 + Math.random() * 0.20;               // travel speed (raise to go faster)
  p.size = 0.45 + Math.random() * 0.8;                // very small nodes
  p.op   = 0.45 + Math.random() * 0.55;
  p.wait = initial ? Math.random() * 4.5 : 0.4 + Math.random() * 3.0;   // staggered respawn
}
for (let i = 0; i < N_TRAY; i++) { const p = {}; spawnTray(p, true); trayParts.push(p); }

function sizeTrayFlow() {
  const dpr = Math.min(window.devicePixelRatio || 1, DPR_CAP);
  const box = trayFlow.getBoundingClientRect();
  TW = box.width; THh = box.height;
  if (TW < 2 || THh < 2) return;
  trayFlow.width = Math.max(1, Math.round(TW * dpr));
  trayFlow.height = Math.max(1, Math.round(THh * dpr));
  tctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function drawTrayFlow(t, dt) {
  if (TW < 2 || THh < 2) { sizeTrayFlow(); if (TW < 2 || THh < 2) return; }
  tctx.clearRect(0, 0, TW, THh);
  if (RIB.debug) {                                   // alignment aid — draw rib polylines
    tctx.strokeStyle = 'rgba(255,90,90,0.7)'; tctx.lineWidth = 1;
    for (const path of trayPaths) { tctx.beginPath();
      for (let i = 0; i < path.length; i++) { const q = ribPoint(path, i / (path.length - 1)); i ? tctx.lineTo(q[0], q[1]) : tctx.moveTo(q[0], q[1]); }
      tctx.stroke(); }
  }
  const gs = Math.max(0.65, THh / 320);
  tctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < N_TRAY; i++) {
    const p = trayParts[i];
    if (p.wait > 0) { p.wait -= dt; continue; }
    p.t += p.spd * dt;
    if (p.t >= 1) { spawnTray(p, false); continue; }
    const q = ribPoint(trayPaths[p.path], p.t);
    const x = q[0], y = q[1];
    const a = p.op * smoothstep(0.10, 0.26, p.t) * (1 - smoothstep(0.80, 1.0, p.t));  // fade in below the logo, out at base
    if (a <= 0.01) continue;
    const gr = (p.size + 0.9) * 1.9 * gs;                 // soft outer glow (smaller)
    tctx.globalAlpha = a * 0.5;
    tctx.drawImage(glowSprite, x - gr, y - gr, gr * 2, gr * 2);
    const cr = p.size * 1.2 * gs;                          // bright core (very small)
    tctx.globalAlpha = a;
    tctx.drawImage(glowSprite, x - cr, y - cr, cr * 2, cr * 2);
  }
  tctx.globalAlpha = 1;
  tctx.globalCompositeOperation = 'source-over';
}

/* On-screen tuner for aligning the ribs to the tray PNG.
   Activate by loading the page with #tune in the URL (proto-ontology.html#tune). */
function buildRibTuner() {
  if (!/tune/.test(location.hash)) return;
  RIB.debug = true;
  const box = document.createElement('div');
  box.style.cssText = 'position:fixed;top:12px;right:12px;z-index:99999;background:rgba(8,8,14,.92);color:#fff;font:12px/1.6 monospace;padding:10px 12px;border:1px solid #333;border-radius:8px;width:200px;';
  const fields = [['xpx','X shift (px)',1],['ypx','Y shift (px)',1],['xscale','X scale',0.005],['yscale','Y scale',0.005]];
  let html = '<div style="margin-bottom:6px;letter-spacing:.12em;opacity:.65">RIB TUNER</div>'
    + '<label style="display:flex;gap:6px;align-items:center;margin:5px 0"><input type="checkbox" id="ribDbg" checked> show rib lines</label>';
  for (const [k,label,step] of fields)
    html += '<label style="display:flex;justify-content:space-between;gap:8px;margin:5px 0">' + label
      + '<input type="number" id="rib_' + k + '" value="' + RIB[k] + '" step="' + step
      + '" style="width:74px;background:#000;color:#fff;border:1px solid #444;border-radius:4px;padding:2px 4px"></label>';
  html += '<div id="ribOut" style="margin-top:8px;opacity:.6;word-break:break-all"></div>';
  box.innerHTML = html;
  document.body.appendChild(box);
  const out = box.querySelector('#ribOut');
  const upd = () => { out.textContent = 'xscale:' + RIB.xscale + ', yscale:' + RIB.yscale + ', xpx:' + RIB.xpx + ', ypx:' + RIB.ypx; };
  box.querySelector('#ribDbg').addEventListener('change', e => { RIB.debug = e.target.checked; });
  for (const [k] of fields) box.querySelector('#rib_' + k).addEventListener('input', e => { RIB[k] = parseFloat(e.target.value) || 0; upd(); });
  upd();
}

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, DPR_CAP);
  const cssW = canvas.offsetWidth, cssH = canvas.offsetHeight;
  canvas.width = Math.max(1, cssW * dpr);
  canvas.height = Math.max(1, cssH * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  W = cssW; H = cssH; cx = W / 2; cy = H / 2;
  // model → screen: tightened band to match the reference scale
  sx = W * 0.346;              // width +20%
  sy = Math.min(H * 0.260, W * 0.122);   // depth (vertical) reduced a further 10%
  updateGround();
  sizeTrayFlow();
}
function SXp(mx) { return cx + mx * sx; }
function SYp(my) { return cy + my * sy; }

/* Ground line = the refinery base. The node band centres on it (50% above,
   50% below), and the line / gradient / labels / tray all anchor to it. */
let groundY = 0;
const OBS_OFFSET = 34, ACT_OFFSET = 14;      // labels straddle the line
const GROUND_FRAC  = 0.58;                    // horizon as a fraction of stage height
const REF_OVERHANG = 0.13;                    // refinery base sits on the line (0.12 gap, 0.15 slightly under, 0.22 overshot) — tunable
const TRAY_RISE    = 34;                      // tray lifted so its top sits under the logo — tunable
function updateGround() {
  groundY = H * GROUND_FRAC;
  cy = groundY;                               // node band centres on the ground line
  // refinery bottom-anchored so its structure base sits on the line; the
  // overhang tucks the PNG's transparent bottom padding below the line and
  // removes the black gap between the refinery and the ground.
  const dispH = refineryLayer.getBoundingClientRect().height || H * 0.35;
  refineryLayer.style.top = (groundY + dispH * REF_OVERHANG - dispH) + 'px';
  refineryLayer.style.transform = 'translateX(-50%)';
  groundLine.style.top = groundY + 'px';
  groundGrad.style.top = groundY + 'px';
  obsLabel.style.top = (groundY - OBS_OFFSET) + 'px';
  actLabel.style.top = (groundY + ACT_OFFSET) + 'px';
  trayLayer.style.top = (groundY - TRAY_RISE) + 'px';   // lifted so its top sits under the logo
}

/* ============================================================
   Scroll-driven reveal state (set by onScrollUpdate, read in draw)
   ============================================================ */
let growth = 0;              // 0→1, drives outward node/edge growth
let logoReveal = 0;          // 0→1, centre M-mark fade-in

/* ---- heartbeat: periodic double-thump like the original ---- */
function heartbeat(t) {
  const p = (t % 1.4) / 1.4;
  const a = Math.exp(-Math.pow(p / 0.05, 2));
  const b = 0.55 * Math.exp(-Math.pow((p - 0.18) / 0.06, 2));
  return Math.min(1, a + b);
}

/* ============================================================
   Playback — pulses/twinkle/heartbeat are time-based; the network
   grow-in is scroll-based. IntersectionObserver pauses off-screen.
   ============================================================ */
let running = false, started = false, onScreen = false, tabHidden = false;
let last = 0, lastFrame = 0;

function tick(now) {
  if (!running) return;
  requestAnimationFrame(tick);
  if (now - lastFrame < FRAME_MS) return;
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now; lastFrame = now;
  draw(now / 1000, dt);
  drawTrayFlow(now / 1000, dt);
}

function draw(t, dt) {
  ctx.clearRect(0, 0, W, H);
  const N = nodes.length;
  const hb = heartbeat(t);

  // per-node visibility from scroll growth (grows outward from centre)
  const vis = new Float32Array(N), fx = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    vis[i] = easeOut(smoothstep(nodes[i].birth, nodes[i].birth + 0.16, growth));
    // horizontal taper — nodes/lines dissolve toward both edges. Symmetric
    // now that the extreme-edge material has been pulled inward, so both
    // sides balance.
    fx[i] = 1 - smoothstep(0.50, 0.95, Math.abs(nodes[i].mx));
  }

  // --- edges ---
  ctx.lineWidth = 1;
  for (let i = 0; i < edges.length; i++) {
    const ea = edges[i].a, eb = edges[i].b;
    const grow = Math.min(vis[ea], vis[eb]);
    if (grow <= 0.01) continue;
    const a = grow * Math.min(fx[ea], fx[eb]);   // horizontal taper toward both edges
    if (a <= 0.01) continue;
    const A = nodes[ea], B = nodes[eb];
    // each endpoint grows out from centre by its own visibility
    const ax = SXp(A.mx * vis[ea]), ay = SYp(A.my * vis[ea]);
    const bx = SXp(B.mx * vis[eb]), by = SYp(B.my * vis[eb]);
    const base = edges[i].spoke ? 0.20 : 0.10;   // cluster spokes read brighter
    ctx.strokeStyle = `rgba(255,255,255,${((base + 0.05 * hb) * a).toFixed(3)})`;
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
  }

  // --- nodes ---
  for (let i = 0; i < N; i++) {
    const e = vis[i];
    if (e <= 0.01 || fx[i] <= 0.01) continue;
    const x = SXp(nodes[i].mx * e), y = SYp(nodes[i].my * e);
    const tw = 0.6 + 0.4 * Math.sin(t * (0.6 + hsh(i) * 1.2) + hsh(i + 2) * 6.28);
    const a = (0.6 * tw + 0.18 * hb) * e * fx[i];   // horizontal taper toward both edges
    ctx.fillStyle = `rgba(255,255,255,${a.toFixed(3)})`;
    ctx.beginPath(); ctx.arc(x, y, nodes[i].size, 0, Math.PI * 2); ctx.fill();
  }

  // --- pulses ---
  for (let i = 0; i < NPULSE; i++) {
    const p = pulses[i];
    p.t += p.dir * p.spd * dt;
    if (p.t < 0 || p.t > 1) {
      p.e = Math.floor(Math.random() * edges.length);
      p.t = Math.random() < 0.5 ? 0 : 1;
      p.dir = p.t === 0 ? 1 : -1;
      p.spd = 0.35 + Math.random() * 0.7;
    }
    const ed = edges[p.e], A = nodes[ed.a], B = nodes[ed.b];
    const grow = Math.min(vis[ed.a], vis[ed.b]);
    const fade = Math.min(fx[ed.a], fx[ed.b]);   // horizontal taper toward both edges
    const e = grow * fade;
    if (e <= 0.05) continue;
    const mx = A.mx + (B.mx - A.mx) * p.t;
    const my = A.my + (B.my - A.my) * p.t;
    const x = SXp(mx * grow), y = SYp(my * grow);
    ctx.fillStyle = `rgba(255,255,255,${(0.28 * e).toFixed(3)})`;
    ctx.beginPath(); ctx.arc(x, y, 2.4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(255,255,255,${(0.95 * e).toFixed(3)})`;
    ctx.beginPath(); ctx.arc(x, y, 1.1, 0, Math.PI * 2); ctx.fill();
  }

  // --- centre M-mark (heart), with heartbeat scale/alpha pulse ---
  if (logoReady && logoReveal > 0.01) {
    const ls = Math.min(W, H) * 0.072 * (1 + 0.03 * hb);
    ctx.globalAlpha = logoReveal * (0.82 + 0.18 * hb);
    ctx.drawImage(logo, cx - ls / 2, cy - ls / 2, ls, ls);
    ctx.globalAlpha = 1;
  }
}

/* ============================================================
   Scroll-driven layer reveal: refinery (fast) → ontology grow →
   tray (top→bottom clip, as if feeding outward from the ontology)
   ============================================================ */
const scrollSpace = document.querySelector('.scroll-space');
function ramp(p, a, b) { return Math.max(0, Math.min(1, (p - a) / (b - a))); }

let scrollTicking = false;
function onScrollUpdate() {
  const rect = scrollSpace.getBoundingClientRect();
  const total = rect.height - window.innerHeight;
  const p = Math.max(0, Math.min(1, -rect.top / total));

  refineryLayer.style.opacity = ramp(p, 0.03, 0.13).toFixed(3);   // fast fade-in first
  canvas.style.opacity        = ramp(p, 0.13, 0.20).toFixed(3);   // node layer switches on
  logoReveal                  = ramp(p, 0.14, 0.26);              // centre mark appears early
  growth                      = ramp(p, 0.18, 0.66);              // network grows outward, bit by bit

  // ground line extends left → right; the maroon gradient fades in beneath it
  const lineReveal = ramp(p, 0.30, 0.56);
  groundLine.style.transform = `scaleX(${lineReveal.toFixed(4)})`;
  groundGrad.style.opacity = ramp(p, 0.34, 0.58).toFixed(3);

  // OBSERVATION then ACTION, one at a time at the end of the reveal.
  // OBSERVATION elevates UP from the ground line to its rest position above;
  // ACTION lowers DOWN under the ground line to its rest position below.
  // Both start on the line (translateY back to groundY) and ease out to rest.
  const obsE = easeOut(ramp(p, 0.60, 0.72));
  obsLabel.style.opacity = ramp(p, 0.60, 0.68).toFixed(3);
  obsLabel.style.transform = `translateY(${(OBS_OFFSET * (1 - obsE)).toFixed(2)}px)`;
  const actE = easeOut(ramp(p, 0.72, 0.84));
  actLabel.style.opacity = ramp(p, 0.72, 0.80).toFixed(3);
  actLabel.style.transform = `translateY(${(-ACT_OFFSET * (1 - actE)).toFixed(2)}px)`;

  // tray reveals top→bottom: bottom inset shrinks 100%→0% (feeds down from ground)
  const trayReveal = ramp(p, 0.56, 0.88);
  trayLayer.style.clipPath = `inset(0 0 ${((1 - trayReveal) * 100).toFixed(2)}% 0)`;

  scrollTicking = false;
}
function onScroll() { if (!scrollTicking) { requestAnimationFrame(onScrollUpdate); scrollTicking = true; } }

/* ============================================================
   Run / pause coordination
   ============================================================ */
function maybeRun() {
  if (!started || tabHidden || !onScreen || reduced) { running = false; return; }
  if (!running) { running = true; last = performance.now(); lastFrame = 0; requestAnimationFrame(tick); }
}
function boot() {
  resize();
  // the refinery image drives the ground-line position; recompute once it lays out
  if (refineryImg.complete && refineryImg.naturalHeight) { updateGround(); onScrollUpdate(); }
  refineryImg.addEventListener('load', () => { updateGround(); onScrollUpdate(); });
  // the tray image drives the tray-flow canvas size (its box comes from the img aspect)
  const trayImgEl = trayLayer.querySelector('img');
  if (trayImgEl.complete && trayImgEl.naturalHeight) sizeTrayFlow();
  trayImgEl.addEventListener('load', sizeTrayFlow);
  window.addEventListener('resize', () => { resize(); onScrollUpdate(); });
  window.addEventListener('scroll', onScroll, { passive: true });
  document.addEventListener('visibilitychange', () => { tabHidden = document.hidden; maybeRun(); });
  if ('IntersectionObserver' in window) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { onScreen = e.isIntersecting; maybeRun(); });
    }, { threshold: 0.02 });
    io.observe(canvas);
  } else { onScreen = true; }
  started = true;
  buildRibTuner();
  onScrollUpdate();
  if (reduced) { growth = 1; logoReveal = 1; draw(0, 0); }
  else maybeRun();
}
boot();
</script>
</body>
</html>
